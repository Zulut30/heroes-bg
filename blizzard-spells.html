<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Заклинания таверны — Конструктор БГ</title>
  <meta name="description" content="Полный список заклинаний таверны Hearthstone Battlegrounds напрямую из Blizzard API: фильтр по уровню, лайтбокс, прозрачный экспорт.">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#dbc07a">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Конструктор БГ">
  <meta property="og:title" content="Заклинания таверны БГ">
  <meta property="og:description" content="Все заклинания Полей сражений с фильтром и экспортом.">
  <meta property="og:image" content="./wallpaper.jpg">
  <meta property="og:locale" content="ru_RU">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Заклинания таверны БГ">
  <meta name="twitter:description" content="Все заклинания Полей сражений с фильтром и экспортом.">
  <meta name="twitter:image" content="./wallpaper.jpg">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <a class="brand-mark" href="./index.html">Battlegrounds Hub</a>
      <nav class="site-nav" aria-label="Основная навигация">
        <a class="nav-link" href="./index.html">Главная</a>
        <a class="nav-link" href="./hero-tier-builder.html">Конструктор тир-листов</a>
        <a class="nav-link" href="./library.html">Библиотека карт</a>
        <a class="nav-link is-active" href="./blizzard-spells.html">Заклинания</a>
        <a class="nav-link" href="./accessories.html">Аксессуары</a>
        <a class="nav-link" href="./strategy-builder.html">Конструктор стратегий</a>
      </nav>
    </header>

    <main>
      <section class="library-controls-panel">
        <div class="controls-topline">
          <div>
            <p class="eyebrow">Фильтры</p>
            <h2 class="panel-title">Библиотека заклинаний</h2>
          </div>
          <div class="controls-actions">
            <button id="spells-reset" class="secondary-button" type="button">Сбросить</button>
            <button id="spells-export" class="download-button" type="button">Скачать выборку</button>
          </div>
        </div>

        <div class="controls-grid">
          <label class="control-field">
            <span class="control-label">Поиск</span>
            <input id="spells-search" class="text-input" type="search" placeholder="Например, золото, таверна, божественный щит">
          </label>

          <label class="control-field">
            <span class="control-label">Таверна</span>
            <select id="spells-filter" class="select-input">
              <option value="ALL">Все уровни</option>
              <option value="1">Таверна 1</option>
              <option value="2">Таверна 2</option>
              <option value="3">Таверна 3</option>
              <option value="4">Таверна 4</option>
              <option value="5">Таверна 5</option>
              <option value="6">Таверна 6</option>
              <option value="7">Таверна 7</option>
            </select>
          </label>
        </div>

        <div class="utility-row">
          <label class="toggle-chip" for="spells-exclude-duos">
            <input id="spells-exclude-duos" type="checkbox">
            <span class="toggle-chip-box"></span>
            <span class="toggle-chip-icon" aria-hidden="true"></span>
            <span class="toggle-chip-label">Исключить дуо-карты</span>
          </label>
        </div>
      </section>

      <section class="library-results">
        <div class="results-bar">
          <div id="spells-status" class="library-status">Загружаю библиотеку заклинаний...</div>
          <div id="spells-counter" class="library-status">0 карточек</div>
        </div>
        <div id="spells-grid" class="library-card-grid library-card-grid-flat" aria-live="polite"></div>
      </section>
    </main>
  </div>

  <div id="lightbox" class="lightbox" hidden>
    <div class="lightbox-backdrop" data-close-lightbox="true"></div>
    <div class="lightbox-dialog" role="dialog" aria-modal="true" aria-labelledby="lightbox-title">
      <button class="lightbox-close" type="button" data-close-lightbox="true" aria-label="Закрыть">×</button>
      <button class="lightbox-nav lightbox-prev" id="lightbox-prev" type="button" aria-label="Предыдущая карта">‹</button>
      <div class="lightbox-body">
        <img id="lightbox-image" class="lightbox-image" alt="">
        <div class="lightbox-copy">
          <p id="lightbox-kicker" class="eyebrow">Battlegrounds Spell</p>
          <h2 id="lightbox-title"></h2>
          <p id="lightbox-meta" class="lightbox-meta"></p>
          <p id="lightbox-text" class="lightbox-text"></p>
        </div>
      </div>
      <button class="lightbox-nav lightbox-next" id="lightbox-next" type="button" aria-label="Следующая карта">›</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pica@9.0.1/dist/pica.min.js"></script>
  <script src="./shared.js"></script>
  <script src="./blizzard-spells.js"></script>
</body>
</html>
